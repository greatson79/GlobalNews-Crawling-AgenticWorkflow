[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    unit: Unit tests for individual script functions
    integration: Integration tests for SOT lifecycle
    structural: Structural validation tests for agents/playbook
    slow: Tests that require heavy NLP model loading (Kiwi, spaCy)
