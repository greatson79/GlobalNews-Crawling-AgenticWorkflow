# GlobalNews Sources Configuration
# All 44 news sites with complete crawling configurations
#
# Generated from Step 6: Per-Site Crawling Strategies
# Source: planning/crawl-strategy-{korean,english,asia,global}.md
# Schema: Step 5 Architecture Blueprint, Section 5c
#
# Sites: 44 (19 Korean + 12 English + 6 Asia-Pacific + 7 Europe/ME)
# Daily article estimate: ~6,395
# Primary methods: RSS(29), Sitemap(9), Playwright(2), API(2), DOM(2)
#
# ============================================================================
# FIELD REFERENCE
# ============================================================================
#
# name:                    Human-readable site name (for display and reports)
# url:                     Canonical base URL including scheme (https://...)
# region:                  Geographic region code (kr, us, uk, cn, jp, de, fr, me, in, tw, il, ru)
# language:                ISO 639-1 language code (ko, en, zh, ja, de, fr, es, ar, he)
# group:                   Site group A-G (determines adapter subdirectory):
#                            A = Korean Major Dailies
#                            B = Korean Economy
#                            C = Korean Niche
#                            D = Korean IT/Science
#                            E = English-Language Western
#                            F = Asia-Pacific
#                            G = Europe/Middle East
#
# crawl.primary_method:    First URL discovery method to try (rss|sitemap|api|playwright|dom)
# crawl.fallback_methods:  Ordered list of fallback methods if primary fails
# crawl.rss_url:           Primary RSS feed URL (absolute or relative to site url)
# crawl.sitemap_url:       Sitemap URL (absolute or relative; typically /sitemap.xml)
# crawl.rate_limit_seconds: Minimum delay (seconds) between consecutive requests to this site
# crawl.crawl_delay_mandatory: robots.txt Crawl-delay value if specified (null = not specified)
# crawl.max_requests_per_hour: Upper bound on hourly request count (safety cap)
# crawl.jitter_seconds:    Random jitter (0-N seconds) added to rate_limit_seconds
#
# anti_block.ua_tier:      User-Agent rotation tier (1=bot UA, 2=10 desktop, 3=50 diverse, 4=Patchright)
# anti_block.default_escalation_tier: Starting tier when blocks are detected (1-6)
# anti_block.max_escalation_tier: Highest tier the system will auto-escalate to (1-6)
# anti_block.requires_proxy: Whether a regional proxy is needed (geo-blocked sites)
# anti_block.proxy_region: Required proxy country code (kr, us, etc.) if requires_proxy=true
# anti_block.bot_block_level: Expected blocking aggressiveness (LOW|MEDIUM|HIGH)
#
# extraction.paywall_type: Paywall handling (none|soft-metered|hard)
#                          hard = title-only extraction (body empty)
#                          soft-metered = limited free articles per day
# extraction.title_only:   If true, only extract title (for hard-paywall sites)
# extraction.rendering_required: Whether JavaScript rendering is needed for extraction
# extraction.charset:      Expected character encoding (utf-8, euc-kr, shift_jis, etc.)
#
# meta.difficulty_tier:    Crawling difficulty assessment (Easy|Medium|Hard|Extreme)
# meta.daily_article_estimate: Expected number of articles per day from this site
# meta.sections_count:     Number of sections/categories on the site
# meta.enabled:            Whether to include this site in crawl runs (true|false)
#
# ============================================================================

